apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent-crds-helm
  namespace: argocd
spec:
  destination:
    namespace: kagent
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: kagent-crds
    helm:
      releaseName: kagent-crds
    repoURL: ghcr.io/kagent-dev/kagent/helm
    targetRevision: 0.8.6
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRDs can be large; server-side apply avoids annotation size issues.
      - ServerSideApply=true
