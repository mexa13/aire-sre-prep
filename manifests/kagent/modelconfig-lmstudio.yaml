apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: lmstudio-openai
  namespace: kagent
spec:
  apiKeySecret: kagent-openai
  apiKeySecretKey: OPENAI_API_KEY
  provider: OpenAI
  # Replace with the model ID that LM Studio exposes in /v1/models.
  model: qwen3-coder
  openAI:
    # For kind on Docker Desktop, host.docker.internal reaches your laptop.
    # Adjust host/port if your LM Studio server listens elsewhere.
    baseUrl: http://host.docker.internal:1234/v1
