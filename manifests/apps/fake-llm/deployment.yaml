apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-llm
  labels:
    app.kubernetes.io/name: fake-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fake-llm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fake-llm
    spec:
      containers:
        - name: fake-llm
          image: fake-llm:prep
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_SERVICE_NAME
              value: fake-llm
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otel-collector:4317
            - name: FAKE_LLM_TTFT_MS
              value: "30"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
