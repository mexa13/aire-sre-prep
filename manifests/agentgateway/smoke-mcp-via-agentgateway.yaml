apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-via-agentgateway
  namespace: aire-prep
spec:
  parentRefs:
    - name: agentgateway-smoke
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: mcp-server
          port: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: agentgateway-mcp-proxy
  namespace: aire-prep
spec:
  type: ExternalName
  externalName: agentgateway-smoke.agentgateway-system.svc.cluster.local
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgateway-mcp
  namespace: aire-prep
spec:
  ingressClassName: nginx
  rules:
    - host: agw-mcp.aire-prep.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentgateway-mcp-proxy
                port:
                  number: 8080
