apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentgateway-ui-forwarder
  namespace: agentgateway-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentgateway-ui-forwarder
  namespace: agentgateway-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentgateway-ui-forwarder
  namespace: agentgateway-system
subjects:
  - kind: ServiceAccount
    name: agentgateway-ui-forwarder
    namespace: agentgateway-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agentgateway-ui-forwarder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway-ui-forwarder
  namespace: agentgateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentgateway-ui-forwarder
  template:
    metadata:
      labels:
        app: agentgateway-ui-forwarder
    spec:
      serviceAccountName: agentgateway-ui-forwarder
      containers:
        - name: kubectl-port-forward
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - |
              while true; do
                POD="$(kubectl get pod -n agentgateway-system -l gateway.networking.k8s.io/gateway-name=agentgateway-smoke -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
                if [ -z "$POD" ]; then
                  echo "agentgateway-smoke pod not found, retrying..."
                  sleep 3
                  continue
                fi
                echo "Forwarding Agent Gateway UI from pod: $POD"
                kubectl -n agentgateway-system port-forward "pod/$POD" --address 0.0.0.0 15000:15000 || true
                sleep 2
              done
          ports:
            - name: http-ui
              containerPort: 15000
---
apiVersion: v1
kind: Service
metadata:
  name: agentgateway-ui-forwarder
  namespace: agentgateway-system
spec:
  selector:
    app: agentgateway-ui-forwarder
  ports:
    - name: http-ui
      port: 15000
      targetPort: 15000
---
apiVersion: v1
kind: Service
metadata:
  name: agentgateway-ui-proxy
  namespace: aire-prep
spec:
  type: ExternalName
  externalName: agentgateway-ui-forwarder.agentgateway-system.svc.cluster.local
  ports:
    - name: http-ui
      port: 15000
      targetPort: 15000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgateway-ui
  namespace: aire-prep
spec:
  ingressClassName: nginx
  rules:
    - host: agw-ui.aire-prep.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentgateway-ui-proxy
                port:
                  number: 15000
