# Prep: Argo CD UI via ingress (HTTP). kind maps 80/443 on localhost. Re-run: make install-argocd
# Ingress backend port follows configs.params.server.insecure (argo-cd chart uses HTTP service port when true).
global:
  domain: argocd.aire-prep.local

configs:
  params:
    server.insecure: "true"

server:
  service:
    type: ClusterIP
  ingress:
    enabled: true
    controller: generic
    ingressClassName: nginx
    hostname: argocd.aire-prep.local
    tls: false
    path: /
    pathType: Prefix
