# Host networking for kind ingress guide compatibility.
controller:
  # Single replica + hostPort 80/443: RollingUpdate tries to run two pods on one node →
  # "didn't have free ports". Recreate tears down the old pod before starting the new one.
  replicaCount: 1
  updateStrategy:
    type: Recreate
  service:
    type: NodePort
  publishService:
    enabled: false
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443
  nodeSelector:
    ingress-ready: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      effect: NoSchedule
  admissionWebhooks:
    enabled: false
  extraArgs:
    publish-status-address: localhost
  # Expose Prometheus metrics (nginx_ingress_controller_*) for Grafana dashboards.
  # fake-llm / whoami do not export http_requests_total; ingress sees their traffic.
  metrics:
    enabled: true
    service:
      annotations: {}
    serviceMonitor:
      enabled: true
      scrapeInterval: 30s
