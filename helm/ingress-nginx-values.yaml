# Host networking for kind ingress guide compatibility.
controller:
  service:
    type: NodePort
  publishService:
    enabled: false
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443
  nodeSelector:
    ingress-ready: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      effect: NoSchedule
  admissionWebhooks:
    enabled: false
  extraArgs:
    publish-status-address: localhost
